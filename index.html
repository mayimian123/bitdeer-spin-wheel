<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bitdeer AI Spin & Win</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="page-bg"></div>
  <div class="tech-grid"></div>
  <div class="scanline"></div>

  <main id="app" class="app" aria-live="polite">
    <header class="top-bar">
      <div class="logo-btn">
        <img src="./素材/logo/bitdeerlogo.svg" alt="Bitdeer AI logo">
      </div>
      <h1 class="title">Spin &amp; Win</h1>
    </header>

    <section class="wheel-stage">
      <div class="pointer" aria-hidden="true"></div>
      <div class="wheel-shell">
        <div id="wheelWrap" class="wheel-wrap">
          <svg id="wheelSvg" class="wheel-svg" viewBox="0 0 1000 1000" role="img" aria-label="Lucky draw wheel"></svg>
        </div>
        <div class="wheel-center">
          <img src="./素材/logo/bitdeerlogo2.png" alt="Bitdeer AI">
        </div>
      </div>
    </section>

    <img id="lucaCorner" class="luca-corner sway-x" src="./素材/luca/站立.png" alt="Luca mascot">

    <button id="settingsTrigger" class="settings-trigger" type="button" aria-label="Settings">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.14 12.94a7.07 7.07 0 0 0 .06-.94c0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.04 7.04 0 0 0-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.37 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
    </button>
  </main>

  <section id="resultModal" class="modal hidden" aria-hidden="true">
    <div id="modalCard" class="modal-card">
      <div id="celebrateBurst" class="celebrate-burst" aria-hidden="true"></div>
      <h2 class="modal-title">Congratulations</h2>
      <p id="resultText" class="result-text">First Prize</p>
      <img id="lucaCelebrate" class="luca-celebrate sway-y" src="./素材/luca/庆祝.png" alt="Luca celebration">
      <button id="closeModalBtn" class="close-btn" type="button">Close</button>
    </div>
  </section>

  <section id="settingsPanel" class="settings hidden" aria-hidden="true">
    <div class="settings-card">
      <h3>Draw Weights</h3>
      <label>First Prize (%)
        <input id="weightFirst" type="number" min="0" max="100" step="1" value="20">
      </label>
      <label>Second Prize (%)
        <input id="weightSecond" type="number" min="0" max="100" step="1" value="30">
      </label>
      <label>Third Prize (%)
        <input id="weightThird" type="number" min="0" max="100" step="1" value="50">
      </label>
      <p id="settingsError" class="settings-error"></p>
      <div class="settings-actions">
        <button id="saveSettingsBtn" class="panel-btn" type="button">Save</button>
        <button id="closeSettingsBtn" class="panel-btn ghost" type="button">Cancel</button>
      </div>
    </div>
  </section>

  <script src="./app.js"></script>
</body>
</html>
